<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>예제 3-5 헤딩(geading) 태그</title>
</head>
<body>
    <h1>h1: 가장 중요한 제목(가장 큰 글씨, 한 문단 구분)</h1>
    <h2>h2: 두 번째 레벨 제목(다소 작은 글씨, 한 줄 띄고 표시)</h2>
    <h3>h3: 세 번째 레벨 제목(보통 크기의 제목)</h3>
    <h4>h4: 네 번째 레벨 제목(조금 작은 크기의 제목)</h4>
    <h5>h5: 다섯 번째 레벨 제목(본문보다 조금 강조된 정도)</h5>
    <h6>h6: 여섯 번째 레벨 제목(가장 작으 크기)</h6>
</body>
</html>
